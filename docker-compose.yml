services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-collection-server
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      OILPRICE_API_URL: ${OILPRICE_API_URL:-https://api.istero.com/resource/v2/oilprice}
      OILPRICE_API_TOKEN: ${OILPRICE_API_TOKEN:?OILPRICE_API_TOKEN is required}
    restart: unless-stopped
