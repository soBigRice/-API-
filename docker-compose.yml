services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-collection-server
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-mysql://api_user:api_password@mysql:3306/api_collection}
      OILPRICE_API_URL: ${OILPRICE_API_URL:-https://api.istero.com/resource/v2/oilprice}
      OILPRICE_API_TOKEN: ${OILPRICE_API_TOKEN:?OILPRICE_API_TOKEN is required}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: api-collection-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-api_collection}
      MYSQL_USER: ${MYSQL_USER:-api_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-api_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
